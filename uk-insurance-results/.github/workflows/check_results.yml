name: Weekly Results Checker

on:
  schedule:
    # Every Monday at 08:00 UTC (during results season: Feb-Apr)
    - cron: '0 8 * * 1'
  # Lets you trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run results checker
        run: python .github/workflows/checker.py

      - name: Commit updated alerts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json
          git diff --staged --quiet || git commit -m "chore: update alerts $(date +'%Y-%m-%d')"
          git push
